<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Crypto Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <style>
        :root {
            --bg-main: #0b0e11; --bg-card: #1e2329; --text-main: #eaecef; 
            --text-sub: #848e9c; --accent-yellow: #fcd535; --border-color: #2b3139;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; display: flex; justify-content: center; min-height: 100dvh; }
        .auth-container { width: 100%; max-width: 480px; padding: 32px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; position: relative;}
        
        .logo { text-align: center; margin-bottom: 24px; }
        .logo span { font-size: 64px; color: var(--accent-yellow); }
        .title { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px;}
        .subtitle { font-size: 15px; color: var(--text-sub); text-align: center; margin-bottom: 40px;}

        .input-group { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; display: flex; align-items: center; padding: 0 16px; margin-bottom: 16px; transition: 0.2s;}
        .input-group:focus-within { border-color: var(--accent-yellow); }
        .input-icon { color: var(--text-sub); margin-right: 12px; }
        .auth-input { width: 100%; padding: 16px 0; background: transparent; border: none; color: var(--text-main); font-size: 16px; outline: none;}

        .btn-submit { background: var(--accent-yellow); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;}
        
        .toggle-mode { text-align: center; margin-top: 32px; font-size: 14px; color: var(--text-sub); }
        .toggle-mode span { color: var(--accent-yellow); font-weight: 600; cursor: pointer; }

        /* TOAST */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
        .toast { background: var(--bg-card); padding: 14px 16px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.8); border-left: 4px solid var(--accent-yellow); animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-out { animation: fadeOut 0.4s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div class="toast-container" id="toastBox"></div>

    <div class="auth-container">
        <div class="logo"><span class="material-symbols-outlined">currency_bitcoin</span></div>
        <div class="title" id="auth-title">Welcome Back</div>
        <div class="subtitle" id="auth-subtitle">Log in to access your portfolio.</div>

        <div class="input-group">
            <span class="material-symbols-outlined input-icon">mail</span>
            <input type="email" class="auth-input" id="inputEmail" placeholder="Email Address">
        </div>

        <div class="input-group">
            <span class="material-symbols-outlined input-icon">lock</span>
            <input type="password" class="auth-input" id="inputPassword" placeholder="Password">
        </div>

        <button class="btn-submit" id="btnSubmit" onclick="prosesAuth()">Log In</button>

        <div class="toggle-mode" id="toggleMode">
            Don't have an account? <span onclick="switchMode('register')">Register Now</span>
        </div>
    </div>

    <script>
        // AUTH GUARD: Jika sudah login, kembalikan ke index.html
        if(localStorage.getItem("bayu_isLoggedIn") === "true") {
            window.location.replace("index.html");
        }

        let mode = 'login'; 

        function munculToast(pesan, ikon = 'error') {
            const box = document.getElementById('toastBox');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<span class="material-symbols-outlined" style="color:var(--text-main);">${ikon}</span><div style="font-size:14px; font-weight:500;">${pesan}</div>`;
            box.appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('inputEmail').value = "";
            document.getElementById('inputPassword').value = "";
            
            if(mode === 'register') {
                document.getElementById('auth-title').innerText = "Create Account";
                document.getElementById('auth-subtitle').innerText = "Join Crypto Pro today.";
                document.getElementById('btnSubmit').innerText = "Sign Up";
                document.getElementById('toggleMode').innerHTML = `Already have an account? <span onclick="switchMode('login')">Log In</span>`;
            } else {
                document.getElementById('auth-title').innerText = "Welcome Back";
                document.getElementById('auth-subtitle').innerText = "Log in to access your portfolio.";
                document.getElementById('btnSubmit').innerText = "Log In";
                document.getElementById('toggleMode').innerHTML = `Don't have an account? <span onclick="switchMode('register')">Register Now</span>`;
            }
        }

        function prosesAuth() {
            let email = document.getElementById('inputEmail').value;
            let pass = document.getElementById('inputPassword').value;

            if(email === "" || pass === "") {
                munculToast("Please fill all fields!"); return;
            }

            if(mode === 'register') {
                localStorage.setItem("bayu_saved_email", email);
                localStorage.setItem("bayu_saved_pass", pass);
                munculToast("Account created! Please log in.", "check_circle");
                switchMode('login'); 
            } else {
                let savedEmail = localStorage.getItem("bayu_saved_email");
                let savedPass = localStorage.getItem("bayu_saved_pass");

                if(!savedEmail) {
                    munculToast("Account not found. Please register first.");
                    return;
                }

                if(email === savedEmail && pass === savedPass) {
                    localStorage.setItem("bayu_isLoggedIn", "true");
                    document.getElementById('btnSubmit').innerText = "Loading...";
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 1000);
                } else {
                    munculToast("Incorrect Email or Password!");
                }
            }
        }
    </script>
</body>
</html>
