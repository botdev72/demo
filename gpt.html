<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PATCH MODE</title>
<style>
body{background:#0b0e11;color:white;font-family:Arial}
.container{max-width:480px;margin:auto;padding:16px}
.card{background:#1e2329;padding:16px;margin-bottom:12px;border-radius:10px}
.row{display:flex;justify-content:space-between}
.green{color:#0ecb81}.red{color:#f6465d}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h3>Balance</h3>
<div id="balance"></div>
</div>

<div class="card">
<h3>BTC</h3>
<div id="price"></div>
</div>

<div class="card">
<h3>Order Book</h3>
<div id="order"></div>
</div>
</div>

<script>

let wallet = {fiat:5000,btc:0};
let price = 70000;

// PATCH: simple trend
function market(){
    let drift = price * 0.001 * (Math.random()>0.5?1:-1);
    let noise = price * 0.001 * (Math.random()-0.5);
    price += drift + noise;
}

// PATCH: better orderbook
function orderbook(){
    let html="";
    for(let i=1;i<=5;i++){
        let spread=i*2;
        html+=`<div class="row red"><span>${(price+spread).toFixed(2)}</span><span>${Math.random().toFixed(3)}</span></div>`;
        html+=`<div class="row green"><span>${(price-spread).toFixed(2)}</span><span>${Math.random().toFixed(3)}</span></div>`;
    }
    document.getElementById("order").innerHTML=html;
}

function render(){
    document.getElementById("price").innerHTML="$"+price.toFixed(2);
    document.getElementById("balance").innerHTML=
        "$"+wallet.fiat.toFixed(2)+" | "+wallet.btc.toFixed(4)+" BTC";
    orderbook();
}

setInterval(()=>{
    market();
    render();
},1500);

render();

</script>
</body>
</html>
