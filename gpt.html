<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Simulator</title>

<style>
body { margin:0; background:#0b0e11; color:#eaecef; font-family:Arial; }
.container { max-width:1200px; margin:auto; padding:10px; }

.grid {
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:10px;
}

.card {
    background:#1e2329;
    padding:10px;
    border-radius:6px;
}

.row { display:flex; justify-content:space-between; font-size:12px; }

.green { color:#0ecb81; }
.red { color:#f6465d; }

input, button {
    width:100%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:4px;
}

button { background:#fcd535; cursor:pointer; }

h3 { margin:0 0 10px 0; font-size:14px; }

.orderbook { height:250px; overflow:hidden; }

</style>
</head>

<body>

<div class="container">

<h2>BTC/USDT</h2>

<div class="grid">

<!-- LEFT -->
<div>

<div class="card">
<h3>Price</h3>
<div id="price" style="font-size:24px;"></div>
</div>

<div class="card">
<h3>Order Book</h3>
<div class="orderbook" id="orderbook"></div>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="card">
<h3>Wallet</h3>
<div id="balance"></div>
</div>

<div class="card">
<h3>Trade</h3>

<input id="amount" placeholder="Amount">

<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>

</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

</div>
</div>

<script>

// ===== STATE =====
let wallet = { usdt: 5000, btc: 0 };
let price = 70000;

let velocity = 0;
let history = [];

// ===== MARKET ENGINE =====
function updateMarket() {

    let force = (Math.random() - 0.5) * 2;

    velocity += force * 0.3;
    velocity *= 0.95;

    price += velocity;

}

// ===== ORDER BOOK =====
function getOrderBook() {

    let bids = [];
    let asks = [];

    for(let i=1;i<=10;i++){

        let spread = i * 2;

        bids.push({
            price: price - spread,
            volume: Math.random()*2 + i*0.3
        });

        asks.push({
            price: price + spread,
            volume: Math.random()*2 + i*0.3
        });
    }

    return {bids, asks};
}

// ===== RENDER ORDERBOOK =====
function renderOrderBook() {

    let book = getOrderBook();
    let html = "";

    // ASKS
    book.asks.reverse().forEach(a=>{
        html += `<div class="row red">
            <span>${a.price.toFixed(2)}</span>
            <span>${a.volume.toFixed(3)}</span>
        </div>`;
    });

    // MID
    html += `<div style="text-align:center;padding:5px 0;">${price.toFixed(2)}</div>`;

    // BIDS
    book.bids.forEach(b=>{
        html += `<div class="row green">
            <span>${b.price.toFixed(2)}</span>
            <span>${b.volume.toFixed(3)}</span>
        </div>`;
    });

    document.getElementById("orderbook").innerHTML = html;
}

// ===== IMPACT =====
function applyImpact(vol) {
    velocity += vol * 0.8;
}

// ===== TRADE =====
function buy(){

    let amt = parseFloat(document.getElementById("amount").value);
    if(!amt || amt > wallet.usdt) return;

    let slippage = 1 + Math.random()*0.002;
    let btc = amt / (price * slippage);

    wallet.usdt -= amt;
    wallet.btc += btc;

    applyImpact(btc);

    log("BUY " + btc.toFixed(5) + " BTC");
}

function sell(){

    let amt = parseFloat(document.getElementById("amount").value);
    if(!amt || amt > wallet.btc) return;

    let slippage = 1 - Math.random()*0.002;
    let usdt = amt * price * slippage;

    wallet.btc -= amt;
    wallet.usdt += usdt;

    applyImpact(-amt);

    log("SELL " + usdt.toFixed(2) + " USDT");
}

// ===== HISTORY =====
function log(t){
    history.push(t);
    if(history.length > 8) history.shift();
    document.getElementById("history").innerHTML = history.join("<br>");
}

// ===== UI =====
function render(){

    document.getElementById("price").innerHTML =
        "$" + price.toFixed(2);

    document.getElementById("balance").innerHTML =
        wallet.usdt.toFixed(2) + " USDT<br>" +
        wallet.btc.toFixed(5) + " BTC";

    renderOrderBook();
}

// ===== LOOP =====
setInterval(()=>{
    updateMarket();
    render();
},1000);

render();

</script>

</body>
</html>
